<svg width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pearl Gradient: Milky white base with very subtle rainbow hues -->
    <linearGradient id="pearl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFF5F8" /> <!-- Faint Pink -->
      <stop offset="40%" stop-color="#F0F9FF" /> <!-- Faint Blue -->
      <stop offset="60%" stop-color="#F2FFF9" /> <!-- Faint Green -->
      <stop offset="80%" stop-color="#FFFBF0" /> <!-- Faint Yellow -->
      <stop offset="100%" stop-color="#F8F8F8" />
    </linearGradient>
    
    <!-- Luster/Shine effect -->
    <linearGradient id="luster" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9" />
      <stop offset="45%" stop-color="white" stop-opacity="0.1" />
      <stop offset="55%" stop-color="black" stop-opacity="0.05" />
      <stop offset="100%" stop-color="black" stop-opacity="0.15" />
    </linearGradient>

    <!-- Subtle glow to make it feel "pearly" -->
    <filter id="pearlGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
      <feComponentTransfer in="blur" result="lowAlpha">
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="lowAlpha" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @font-face {
      font-family: 'Unbounded';
      font-style: normal;
      font-weight: 900;
      src: local('Unbounded Black'), local('Unbounded-Black'), url(https://fonts.gstatic.com/s/unbounded/v3/9oUn730S6H7FSA_YmC_lXf6fPqC4yNSc.woff2) format('woff2');
    }
    .roucaarize-text {
      font-family: 'Unbounded', 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>

  <!-- Base pearl text -->
  <text x="50%" y="95" text-anchor="middle" font-size="95" fill="url(#pearl)" filter="url(#pearlGlow)" class="roucaarize-text">
    ROUCAARIZE
  </text>
  
  <!-- Overlay luster for that 3D pearlescent feel -->
  <text x="50%" y="95" text-anchor="middle" font-size="95" fill="url(#luster)" class="roucaarize-text" opacity="0.5" pointer-events="none">
    ROUCAARIZE
  </text>
</svg>
