<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Pastel Gradient -->
    <linearGradient id="rouGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glassmorphism Filter -->
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Subtle Glow -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="glow" />
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon: Cute stylized 'R' in a glass orb -->
  <g transform="translate(120, 150)">
    <!-- Outer Glow Orb -->
    <circle cx="0" cy="0" r="70" fill="url(#rouGradient)" opacity="0.3" filter="url(#softGlow)" />
    <!-- Glass Orb -->
    <circle cx="0" cy="0" r="60" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.4" stroke-width="2" />
    <!-- Stylized R -->
    <path d="M-15,-22 L-15,18 M-15,-22 L8,-22 C20,-22 20,-2 8,-2 L-15,-2 M5,-2 L18,18" 
          stroke="url(#rouGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Sparkle -->
    <circle cx="25" cy="-25" r="4" fill="white" opacity="0.8" />
  </g>

  <!-- Text: ROUCAARIZE -->
  <text x="240" y="175" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="100" fill="#1e1b4b" letter-spacing="2">
    ROUCAARIZE
  </text>
  
  <text x="245" y="215" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="#6366f1" letter-spacing="6" opacity="0.8">
    CLEAN LINUX ORCHESTRATION
  </text>
  
  <!-- Subtle decorative elements -->
  <circle cx="850" cy="50" r="20" fill="url(#rouGradient)" opacity="0.1" />
  <circle cx="820" cy="250" r="15" fill="none" stroke="url(#rouGradient)" stroke-width="2" opacity="0.2" />
</svg>
